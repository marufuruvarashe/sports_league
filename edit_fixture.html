    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <button class="sidebar-toggle">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>

            <a href="dashboard.html">Home</a>
            <span>/</span>
            <a href="fixtures.html">Fixtures</a>
            <span>/</span>
            <span>Edit Fixture</span>
          </div>

        <div class="top-bar-right">

            <div class="user-avatar">JD</div>
            <span>John Doe</span>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <h1>Edit Fixture</h1>
          <p>Update fixture details</p>
        </div>

        <div class="card" style="max-width: 800px;">
          <div class="card-header">
            <h3>Fixture Details</h3>
          </div>
          <div class="card-body">
            <form id="fixtureForm">
              <div class="form-group">
                <label for="sport">Sport</label>
                <select id="sport" class="form-control" onchange="filterTeamsBySelectedSport()">
                  <option value="">Select a sport</option>
                  <option value="football" selected>Football</option>
                  <option value="basketball">Basketball</option>
                  <option value="netball">Netball</option>
                  <option value="cricket">Cricket</option>
                  <option value="rugby">Rugby</option>
                  <option value="athletics">Athletics</option>
                </select>
                <span class="error-message"></span>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="homeTeam">Home Team</label>
                  <select id="homeTeam" class="form-control">
                    <option value="">Select home team</option>
                    <option value="dynamos" selected>Dynamos FC</option>
                    <option value="caps">Caps United</option>
                    <option value="highlanders">Highlanders</option>
                    <option value="fc-platinum">FC Platinum</option>
                    <option value="black-rhinos">Black Rhinos</option>
                    <option value="harare-hawks">Harare Hawks</option>
                    <option value="bulawayo-lions">Bulawayo Lions</option>
                    <option value="queens-nc">Queens NC</option>
                    <option value="rising-stars">Rising Stars</option>
                  </select>
                  <span class="error-message"></span>
                </div>

                <div class="form-group">
                  <label for="awayTeam">Away Team</label>
                  <select id="awayTeam" class="form-control">
                    <option value="">Select away team</option>
                    <option value="dynamos">Dynamos FC</option>
                    <option value="caps" selected>Caps United</option>
                    <option value="highlanders">Highlanders</option>
                    <option value="fc-platinum">FC Platinum</option>
                    <option value="black-rhinos">Black Rhinos</option>
                    <option value="harare-hawks">Harare Hawks</option>
                    <option value="bulawayo-lions">Bulawayo Lions</option>
                    <option value="queens-nc">Queens NC</option>
                    <option value="rising-stars">Rising Stars</option>
                  </select>
                  <span class="error-message"></span>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="fixtureDate">Date & Time</label>
                  <input type="datetime-local" id="fixtureDate" class="form-control" value="2026-01-28T15:00">
                  <span class="error-message"></span>
                </div>

                <div class="form-group">
                  <label for="venue">Venue</label>
                  <input type="text" id="venue" class="form-control" value="National Sports Stadium">
                  <span class="error-message"></span>
                </div>
              </div>

              <div class="form-group">
                <label for="status">Status</label>
                <select id="status" class="form-control">
                  <option value="upcoming" selected>Upcoming</option>
                  <option value="completed">Completed</option>
                  <option value="postponed">Postponed</option>
                  <option value="cancelled">Cancelled</option>
                </select>
              </div>

              <div class="form-group">
                <label for="notes">Additional Notes (Optional)</label>
                <textarea id="notes" class="form-control" rows="3" placeholder="Any additional information..."></textarea>
              </div>

              <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary">Update Fixture</button>
                <a href="fixtures.html" class="btn btn-secondary">Cancel</a>
                <button type="button" class="btn btn-danger" style="margin-left: auto;" onclick="deleteCurrentFixture()">Delete Fixture</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

  <script src="js/main.js"></script>
  <script src="js/api.js"></script>

  <script>
    function deleteCurrentFixture() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) return alert('No fixture id');
      if (confirm('Are you sure you want to delete this fixture?')) {
        deleteFixture(id).then(() => {
          // redirect to fixtures page after deletion
          setTimeout(() => { window.location.href = 'fixtures.html'; }, 600);
        });
      }
    }
  </script>
  <script src="js/main.js"></script>
  <script src="js/api.js"></script>
