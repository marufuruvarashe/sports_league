<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Zimbabwe Sports League Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container" style="max-width: 500px;">
      <div class="auth-card">
        <div class="auth-header">
          <a href="index.html" class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
            ZimSports
          </a>
          <h2>Create Account</h2>
          <p>Join the sports community today</p>
        </div>
        
        <form id="registerForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="Enter your full name">
            <span class="error-message"></span>
          </div>
          
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="Enter your email">
            <span class="error-message"></span>
          </div>
          
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" class="form-control" placeholder="+263 7XX XXX XXX">
            <span class="error-message"></span>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" class="form-control" placeholder="Create password">
              <span class="error-message"></span>
            </div>
            
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password">
              <span class="error-message"></span>
            </div>
          </div>
          
          <div class="form-group">
            <label for="role">Select Your Role</label>
            <select id="role" class="form-control">
              <option value="">Choose a role</option>
              <option value="player">Player</option>
              <option value="coach">Coach</option>
              <option value="admin">League Administrator</option>
            </select>
            <span class="error-message"></span>
          </div>
          
          <div class="form-group">
            <label style="display: flex; align-items: flex-start; gap: 0.5rem; margin: 0; cursor: pointer;">
              <input type="checkbox" style="width: auto; margin-top: 0.25rem;" required>
              <span style="font-weight: 400; font-size: 0.875rem;">I agree to the <a href="#" style="color: var(--primary-blue);">Terms of Service</a> and <a href="#" style="color: var(--primary-blue);">Privacy Policy</a></span>
            </label>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </form>
        
        <div class="auth-links">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/api.js"></script>
</body>
</html>
